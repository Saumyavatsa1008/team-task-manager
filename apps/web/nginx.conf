server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional: set caching for static assets
  location ~* \.(?:css|js|json|woff2|woff|ttf|svg|png|jpg|jpeg|gif|ico)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public";
  }
}
server {
  listen ${PORT};
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Long-cache static assets, never cache index.html
  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # SPA fallback: every unknown route serves the app shell.
  location / {
    try_files $uri /index.html;
  }
}
